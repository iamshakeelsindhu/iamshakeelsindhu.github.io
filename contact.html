<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Shakeel Ahmed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .contact-info {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            height: fit-content;
        }

        .contact-item {
            margin-bottom: 1.5rem;
        }

        .contact-item h3 {
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .contact-item p {
            color: var(--text);
        }

        .contact-item a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact-item a:hover {
            color: var(--secondary);
        }

        .contact-form {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--hover-bg);
            border-radius: 6px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-2px);
            background: var(--primary);
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <nav>
            <div class="logo">Shakeel Ahmed</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About/CV</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>

        <div class="contact-grid">
            <div class="contact-info">
                <h2 class="section-title">Contact Information</h2>
                
                <div class="contact-item">
                    <h3>Email</h3>
                    <p><a href="mailto:shakeelsindhu@hotmail.com">shakeelsindhu@hotmail.com</a></p>
                </div>

                <div class="contact-item">
                    <h3>Phone</h3>
                    <p>(+92) 3234961041</p>
                    <p>(+886) 902 459694</p>
                </div>

                <div class="contact-item">
                    <h3>Location</h3>
                    <p>No. 25, Ln. 331, Wuxing Rd., Zhongli Dist., Taoyuan City</p>
                </div>

                <div class="social-links">
                    <a href="https://www.linkedin.com/in/iamshakeelsindhu/" target="_blank" class="social-link">
                        LinkedIn
                    </a>
                    <a href="https://iamshakeelsindhu.github.io/" target="_blank" class="social-link">
                        GitHub
                    </a>
                </div>
            </div>

            <div class="contact-form">
                <h2 class="section-title">Send Me a Message</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>

                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        particlesJS('particles-js',
          {
            "particles": {
              "number": {
                "value": 80,
                "density": {
                  "enable": true,
                  "value_area": 800
                }
              },
              "color": {
                "value": "#3b82f6"
              },
              "shape": {
                "type": "circle"
              },
              "opacity": {
                "value": 0.5,
                "random": false
              },
              "size": {
                "value": 3,
                "random": true
              },
              "line_linked": {
                "enable": true,
                "distance": 150,
                "color": "#3b82f6",
                "opacity": 0.4,
                "width": 1
              },
              "move": {
                "enable": true,
                "speed": 6,
                "direction": "none",
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false
              }
            },
            "interactivity": {
              "detect_on": "canvas",
              "events": {
                "onhover": {
                  "enable": true,
                  "mode": "repulse"
                },
                "onclick": {
                  "enable": true,
                  "mode": "push"
                },
                "resize": true
              }
            },
            "retina_detect": true
          }
        );

        // Basic form handling
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add your form submission logic here
            alert('Thank you for your message! I will get back to you soon.');
            this.reset();
        });
    </script>
</body>
</html>
